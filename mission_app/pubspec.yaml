name: go4me
description: "A plataforma oficial Go4Me para missões cristãs."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5
  go_router: ^17.1.0
  google_fonts: ^8.0.1
  url_launcher: ^6.3.2
  font_awesome_flutter: ^10.12.0
  intl: ^0.20.2
  gap: ^3.0.1
  lottie: ^3.3.2
  flutter_animate: ^4.5.2
  http: ^1.6.0
  image_picker: ^1.2.1
  flutter_image_compress: ^2.4.0
  path_provider: ^2.1.5
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  shared_preferences: ^2.5.4
  supabase_flutter: ^2.8.1
  flutter_dotenv: ^5.2.1
  flutter_stripe: ^11.4.0
  flutter_local_notifications: ^17.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/
    - assets/geo/
    - .env
